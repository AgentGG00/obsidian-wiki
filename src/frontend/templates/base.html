<!DOCTYPE html>
<html lang="de" class="{{ vault_name }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const k1 = document.cookie.includes("cookie_consent_k1=true");
            const theme = (k1 ? localStorage.getItem("theme") : null)
                || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <title>{% block title %}Wiki{% endblock %} – {{ campaign_name }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="{{ vault_name }}">

    {% include "cookie-banner.html" %}
    {% include "icons.svg" %}

    <nav>
        <a href="/" class="nav-logo">
            <svg class="nav-icon" aria-hidden="true">
                <use href="#icon-{{ vault_icon }}"/>
            </svg>
            {{ campaign_name | upper }}
        </a>
        <div class="nav-actions">
            <button id="theme-toggle" aria-label="Theme wechseln">
                <svg class="theme-icon" aria-hidden="true">
                    <use id="theme-icon-use" href="#icon-sun"/>
                </svg>
            </button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <span>{{ campaign_name }}</span>
        <a href="/datenschutz">Datenschutz</a>
    </footer>

    <script src="/static/script.js"></script>

</body>
</html>
