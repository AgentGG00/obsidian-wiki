<!DOCTYPE html>
<html lang="de" class="{{ vault_name }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <title>{% block title %}Wiki{% endblock %} – {{ campaign_name }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/book.css">
</head>
<body class="{{ vault_name }}"
      data-campaign="{{ campaign_name }}"
      data-vault-icon="{{ vault_icon }}">

    {% include "icons.svg" %}

    <div id="book-root">

        <header id="book-header">
            <div class="book-header-left">
                <button id="back-btn" class="header-btn back-btn" aria-label="Zurück" style="display:none">
                    <svg aria-hidden="true"><use href="#icon-arrow-left"/></svg>
                    <span id="back-label">Zurück</span>
                </button>
                <div class="header-separator" id="back-separator" style="display:none"></div>
                <div class="toc-wrapper">
                    <button id="toc-toggle" class="header-btn" aria-label="Inhaltsverzeichnis">
                        <svg class="nav-icon" aria-hidden="true">
                            <use href="#icon-{{ vault_icon }}"/>
                        </svg>
                        <span>Inhalt</span>
                    </button>
                </div>
            </div>
            <div class="book-header-right">
                <button id="theme-toggle" aria-label="Theme wechseln">
                    <svg class="theme-icon" aria-hidden="true">
                        <use id="theme-icon-use" href="#icon-sun"/>
                    </svg>
                </button>
            </div>
        </header>

        <div id="book-stage">
            <div id="book-page" class="book-page">
                <div class="book-page-content" id="page-content">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>

        <footer id="book-footer">
            <div class="book-footer-left">
                <button id="nav-prev" class="nav-arrow" aria-label="Zurück">
                    <svg aria-hidden="true"><use href="#icon-arrow-left"/></svg>
                </button>
            </div>
            <div class="book-footer-center">
                <span class="footer-campaign">{{ campaign_name }}</span>
                <a href="/datenschutz" class="footer-link">Datenschutz</a>
            </div>
            <div class="book-footer-right">
                <span id="page-num" class="page-number"></span>
                <button id="nav-next" class="nav-arrow" aria-label="Vor">
                    <svg aria-hidden="true"><use href="#icon-arrow-right"/></svg>
                </button>
            </div>
        </footer>

    </div>

    <nav id="toc-dropdown" class="toc-dropdown" hidden>
        <div id="toc-dropdown-inner"></div>
    </nav>

    <script src="/static/book.js"></script>

</body>
</html>
