<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wiki{% endblock %} – {{ campaign_name }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="{{ vault_name }}">
    <nav>
        <a href="/" class="nav-logo">📖 {{ campaign_name }}</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>{{ campaign_name }} – D&D Wiki</p>
        <button id="theme-toggle">🌓 Theme</button>
    </footer>
    <script src="/static/script.js"></script>
</body>
</html>
