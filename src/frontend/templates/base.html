<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Wiki{% endblock %} – {{ campaign_name }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="{{ vault_name }}">

    {% include "icons.svg" %}

    <nav>
        <a href="/" class="nav-logo">
            <svg class="nav-icon" aria-hidden="true">
                <use href="#icon-{{ vault_icon }}"/>
            </svg>
            {{ campaign_name | upper }}
        </a>
        <div class="nav-actions">
            <button id="theme-toggle" aria-label="Theme wechseln">
                <svg class="theme-icon" aria-hidden="true">
                    <use id="theme-icon-use" href="#icon-sun"/>
                </svg>
            </button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <span>{{ campaign_name }}</span>
        <a href="/datenschutz">Datenschutz</a>
    </footer>

    <script src="/static/script.js"></script>
    
</body>
</html>
