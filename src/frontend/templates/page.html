{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<article class="wiki-page">
    <h1>{{ title }}</h1>
    <div class="wiki-content">
        {{ content | safe }}
    </div>
</article>

<nav class="page-nav">
    {% if prev_page %}
    <a href="/{{ prev_page.slug }}" class="page-nav-prev">← {{ prev_page.title }}</a>
    {% else %}
    <span></span>
    {% endif %}

    {% if next_page %}
    <a href="/{{ next_page.slug }}" class="page-nav-next">{{ next_page.title }} →</a>
    {% endif %}
</nav>
{% endblock %}
