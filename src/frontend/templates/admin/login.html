{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="admin-login">
    <h2>Admin Login</h2>
    <div id="error-msg" class="error-msg" style="display:none;"></div>
    <div class="login-form">
        <select id="admin-name">
            {% for admin in admins %}
            <option value="{{ admin }}">{{ admin | capitalize }}</option>
            {% endfor %}
        </select>
        <input type="password" id="password" placeholder="Passwort" autofocus>
        <button class="btn btn-primary" id="login-btn">Anmelden</button>
    </div>
</div>
{% endblock %}
