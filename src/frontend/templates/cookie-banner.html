<div id="cookie-overlay"></div>

<div id="cookie-banner">
    <div class="cookie-banner-inner">
        <p>Diese Seite verwendet Cookies um dein Erlebnis zu verbessern. Du kannst wählen welche Cookies du erlaubst.</p>
        <div class="cookie-options">
            <label class="cookie-option">
                <input type="checkbox" id="cookie-k1" checked>
                <span>
                    Theme-Präferenz speichern
                    <small>Merkt sich ob du Hell- oder Dunkel-Modus bevorzugst.</small>
                </span>
            </label>
            <label class="cookie-option">
                <input type="checkbox" id="cookie-k2">
                <span>
                    Komfort-Cookies
                    <small>Speichert deinen Namen und ermöglicht eigene Kommentare zu bearbeiten.</small>
                </span>
            </label>
        </div>
        <div class="cookie-actions">
            <button class="btn btn-primary" id="cookie-accept">Auswahl bestätigen</button>
            <button class="btn" id="cookie-accept-all">Alle akzeptieren</button>
            <button class="btn" id="cookie-reject">Ablehnen</button>
        </div>
    </div>
</div>
